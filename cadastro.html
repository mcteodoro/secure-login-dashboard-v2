<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="container">
    <h1>Criar Conta</h1>

    <input type="text" id="nome" placeholder="Seu nome">

    <input type="email" id="email" placeholder="Seu e-mail">

   <div class="senha-box">
  <input type="password" id="senha" placeholder="Crie uma senha">
  <i class="fa-solid fa-eye" onclick="mostrarSenha('senha', this)"></i>
</div>

<div class="senha-box">
  <input type="password" id="confirmar" placeholder="Confirme a senha">
  <i class="fa-solid fa-eye" onclick="mostrarSenha('confirmar', this)"></i>
</div>
    <button onclick="cadastrar()">Cadastrar</button>

    <p id="mensagem"></p>

    <a href="index.html">Voltar para login</a>
  </div>

  <script src="script.js"></script>

</body>
</html>
